sheets:
  - id: "daily"
    name: "Daily Sheet"
    columns:
      - id: "Date"
        name: "Date"
        type: "date"
      - id: "SleepNight"
        name: "Sleep hours - Night"
        type: "numeric"
      - id: "SleepAfternoon"
        name: "Sleep hours - Afternoon"
        type: "numeric"
      - id: "SleepTotal"
        name: "Sleep hours - Total"
        type: "computed"
        formula: "SleepNight + SleepAfternoon"
        rules:
          - condition: "val <= 6"
            label: "very low"
            color: "red"
          - condition: "val <= 8.5"
            label: "low"
            color: "orange"
          - condition: "val > 8.5"
            label: "good"
            color: "green"        
      - id: "RPE"
        name: "RPE (1-10)"
        type: "integer"
        min: 1
        max: 10
        rules:
          - condition: "val <= 3"
            label: "good"
            color: "green"
          - condition: "val <= 6"
            label: "neutral"
            color: "yellow"
          - condition: "val <= 8"
            label: "bad"
            color: "orange"
          - condition: "val > 8"
            label: "very bad"
            color: "red"
      - id: "Soreness"
        name: "Soreness (1-10)"
        type: "integer"
        min: 1
        max: 10
        rules:
          - condition: "val <= 3"
            label: "good"
            color: "green"
          - condition: "val <= 6"
            label: "neutral"
            color: "yellow"
          - condition: "val <= 8"
            label: "bad"
            color: "orange"
          - condition: "val > 8"
            label: "very bad"
            color: "red"      
      - id: "Mood"
        name: "Mood (1-10)"
        type: "integer"
        min: 1
        max: 10
        rules:
          - condition: "val <= 3"
            label: "very bad"
            color: "red"
          - condition: "val <= 6"
            label: "bad"
            color: "orange"
          - condition: "val <= 8"
            label: "neutral"
            color: "yellow"
          - condition: "val > 8"
            label: "good"
            color: "green"      
      - id: "Flag"
        name: "Flag"
        type: "computed"
        formula: "DailyFlag"
      - id: "Notes"
        name: "Notes"
        type: "text"

  - id: "weekly"
    name: "Weekly Sheet"
    columns:
      - id: "WeekStart"
        name: "Week Start"
        type: "date"
      - id: "Time400m"
        name: "400m Time (s)"
        type: "numeric"
      - id: "HangOverhead"
        name: "Hang (s) - overhead"
        type: "numeric"
      - id: "HangLeft"
        name: "Hang (s) - left arm"
        type: "numeric"
      - id: "HangRight"
        name: "Hang (s) - right arm"
        type: "numeric"
      - id: "Server20"
        name: "Server / 20"
        type: "numeric"
      - id: "WallHits30s"
        name: "Wall Hits / 30s"
        type: "numeric"
      - id: "Sprint5m"
        name: "5m sprint (s)"
        type: "numeric"
      - id: "SpiderDrill"
        name: "Spider Drill (s)"
        type: "numeric"
      - id: "ServeKmh"
        name: "Serve (Km/h)"
        type: "numeric"

  - id: "monthly"
    name: "Monthly Sheet"
    columns:
      - id: "Date"
        name: "Date"
        type: "date"
      - id: "BeepScore"
        name: "Beep Test Score"
        type: "numeric"
      - id: "Run12k"
        name: "1.2 KM run"
        type: "numeric"
      - id: "BodyFat"
        name: "BF %"
        type: "numeric"
      - id: "Weight"
        name: "Weight (kg)"
        type: "numeric"
      - id: "BroadJump"
        name: "Broad Jump (cm)"
        type: "numeric"
        rules:
          - condition: "val >= 181"
            label: "ideal"
            color: "green"
          - condition: "val < 181"
            label: "below ideal"
            color: "orange"
      - id: "AnkleMobility"
        name: "Ankle Mobility (cm)"
        type: "numeric"
        rules:
          - condition: "val > 12"
            label: "ideal"
            color: "green"
          - condition: "val <= 12"
            label: "below ideal"
            color: "orange"
      - id: "LimbRight"
        name: "Limb girth - right (cm)"
        type: "numeric"
      - id: "LimbLeft"
        name: "Limb girth - left (cm)"
        type: "numeric"
      - id: "LimbDiff"
        name: "Limb girth - diff (%)"
        type: "computed"
        formula: "LimbGirthDiff"
      - id: "StabilityRight"
        name: "Single leg stability Right"
        type: "boolean"
      - id: "StabilityLeft"
        name: "Single leg stability Left"
        type: "boolean"
      - id: "IntRotationRight"
        name: "Internal Rotation - Right"
        type: "numeric"
        rules:
          - condition: "val >= 40 && val <= 60"
            label: "ideal"
            color: "green"
          - condition: "val < 40 || val > 60"
            label: "out of range"
            color: "orange"
      - id: "IntRotationLeft"
        name: "Internal Rotation - Left"
        type: "numeric"
        rules:
          - condition: "val >= 50 && val <= 70"
            label: "ideal"
            color: "green"
          - condition: "val < 50 || val > 70"
            label: "out of range"
            color: "orange"
      - id: "IntRotationDelta"
        name: "Internal Rotation - Delta"
        type: "computed"
        formula: "RotationDelta"
        rules:
          - condition: "val <= 10"
            label: "ideal"
            color: "green"
          - condition: "val > 10"
            label: "high asymmetry"
            color: "red"
      - id: "ThomasTest"
        name: "Thomas hip test - Pass"
        type: "boolean"
      - id: "AvgMood"
        name: "Average mood (1-10)"
        type: "integer"
        min: 1
        max: 10

  - id: "weight"
    name: "Weight Sheet"
    columns:
      - id: "Date"
        name: "Date"
        type: "date"
      - id: "Weight"
        name: "Weight (kg)"
        type: "numeric"
      - id: "BMI"
        name: "BMI"
        type: "numeric"
        rules:
          - condition: "val < 18.5"
            label: "low"
            color: "amber"
          - condition: "val < 25"
            label: "good"
            color: "green"
          - condition: "val <= 30"
            label: "high"
            color: "orange"
          - condition: "val > 30"
            label: "very high"
            color: "red"
      - id: "BodyFatRatio"
        name: "Body Fat Ratio %"
        type: "numeric"
        rules:
          - condition: "(gender == 'female' && val <= 21) || (gender == 'male' && val <= 11)"
            label: "low"
            color: "amber"
          - condition: "(gender == 'female' && val <= 33) || (gender == 'male' && val <= 22)"
            label: "good"
            color: "green"
          - condition: "(gender == 'female' && val <= 39) || (gender == 'male' && val <= 28)"
            label: "high"
            color: "orange"
          - condition: "(gender == 'female' && val > 39) || (gender == 'male' && val > 28)"
            label: "very high"
            color: "red"
      - id: "MuscleRate"
        name: "Muscle Rate %"
        type: "numeric"
      - id: "BodyWater"
        name: "Body Water %"
        type: "numeric"
        rules:
          - condition: "(gender == 'female' && val <= 45) || (gender == 'male' && val <= 52.74)"
            label: "low"
            color: "amber"
          - condition: "(gender == 'female' && val <= 60) || (gender == 'male' && val <= 65)"
            label: "good"
            color: "green"
          - condition: "(gender == 'female' && val > 60) || (gender == 'male' && val > 65)"
            label: "high"
            color: "orange"
      - id: "BoneMass"
        name: "Bone Mass (kg)"
        type: "numeric"
        rules:
          - condition: "(gender == 'female' && val <= 2.4) || (gender == 'male' && val <= 3.1)"
            label: "low"
            color: "amber"
          - condition: "(gender == 'female' && val <= 2.6) || (gender == 'male' && val <= 3.3)"
            label: "good"
            color: "green"
          - condition: "(gender == 'female' && val > 2.6) || (gender == 'male' && val > 3.3)"
            label: "high"
            color: "orange"
      - id: "BMR"
        name: "BMR (kcal)"
        type: "numeric"
        rules:
          - condition: "val <= 1472.5"
            label: "low"
            color: "amber"
          - condition: "val > 1472.5"
            label: "good"
            color: "green"
      - id: "MetabolicAge"
        name: "Metabolic Age"
        type: "numeric"
      - id: "VisceralFat"
        name: "Visceral Fat %"
        type: "numeric"
        rules:
          - condition: "val <= 9"
            label: "good"
            color: "green"
          - condition: "val <= 14"
            label: "high"
            color: "orange"
          - condition: "val > 14"
            label: "too high"
            color: "red"
      - id: "SubcutaneousFat"
        name: "Subcutaneous Fat %"
        type: "numeric"
        rules:
          - condition: "val <= 9"
            label: "good"
            color: "green"
          - condition: "val <= 14"
            label: "high"
            color: "orange"
          - condition: "val > 14"
            label: "too high"
            color: "red"
      - id: "ProteinMass"
        name: "Protein Mass (kg)"
        type: "numeric"
        rules:
          - condition: "(gender == 'female' && val <= 14) || (gender == 'male' && val <= 16)"
            label: "very low"
            color: "deepOrange"
          - condition: "(gender == 'female' && val <= 16) || (gender == 'male' && val <= 18)"
            label: "low"
            color: "amber"
          - condition: "(gender == 'female' && val > 16) || (gender == 'male' && val > 18)"
            label: "good"
            color: "green"
      - id: "MuscleMass"
        name: "Muscle Mass (kg)"
        type: "numeric"
      - id: "WeightWithoutFat"
        name: "Weight Without Fat (kg)"
        type: "numeric"
      - id: "SkeletalMuscleMass"
        name: "Skeletal Muscle Mass (kg)"
        type: "numeric"
